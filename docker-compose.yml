version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: qr_studio_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: qr_studio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qr_network

  redis:
    image: redis:7-alpine
    container_name: qr_studio_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - qr_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qr_studio_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_password@db:5432/qr_studio?schema=public
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - PORT=5000
    depends_on:
      - db
      - redis
    ports:
      - "5000:5000"
    networks:
      - qr_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: qr_studio_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - PORT=3000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - qr_network

  nginx:
    image: nginx:alpine
    container_name: qr_studio_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - qr_network

volumes:
  postgres_data:
  redis_data:

networks:
  qr_network:
    driver: bridge
